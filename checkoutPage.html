<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Elvra.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="checkoutPage.css">
    
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/logoimg.png" alt="Logo">
            <h2>Elvra.</h2>
        </div>
        <div class="header-icons">
            <a href="homePage.html" style="color: #333;"><i class="fa-solid fa-house"></i></a>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-layout">
            <div class="checkout-box form-side">
                <h2 class="checkout-title">Shipping Information</h2>
                <div class="form-group"><label>Full name</label><input type="text" placeholder="Your name..."></div>
                <div class="form-group"><label>Address</label><input type="text" placeholder="Complete address..."></div>
                <h2 class="checkout-title" style="margin-top:20px;">Payment</h2>
                <div style="padding: 10px; border: 1px solid #eee; border-radius: 4px;">
                    <input type="radio" checked> QRIS / E-Wallet
                </div>
            </div>

            <div class="checkout-box summary-side">
                <h2 class="checkout-title">Summary</h2>
                <div id="display-produk">
                    <p style="color: #999; font-size: 13px;">Loading products...</p>
                </div>
                <div style="margin-top: 20px;">
                    <div class="summary-line"><span>Subtotal</span><span id="txt-sub">Rp0</span></div>
                    <div class="summary-line"><span>Postage</span><span>Rp15.000</span></div>
                    <div class="summary-line total-line"><span>Total</span><span id="txt-total">Rp0</span></div>
                </div>
                <button class="btn-pay" id="btn-konfirmasi">Pay Now</button>
            </div>
        </div>
    </main>

    <script src="checkoutPage.js"></script>
</body>
</html>
