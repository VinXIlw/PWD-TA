<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Elvra.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="homePage.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body class="cart-bg-neu">

    <header>
        <div class="logo">
            <a href="homePage.html" style="display: flex; align-items: center; color: inherit;">
                <img src="images/logoimg.png" alt="Logo">
                <h2>Elvra.</h2>
            </a>
        </div>
        <nav class="navbar">
            <a href="homePage.html">Home</a>
            <a href="homePage.html#about-us">About</a>
            <a href="ProductsPage.html">Products</a>
            <a href="#">Review</a>
            <a href="Contact.html">Contact</a>
        </nav>
        <div class="header-icons">
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="UserPage.html"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

    <main class="cart-main-container">
        <div class="neu-cart-box">
            
            <div id="cart-list">
                <p style="text-align: center; color: #888; margin: 40px 0;">Memuat keranjang...</p>
            </div>

            <div class="neu-summary-area">
                <div class="neu-total-box">
                    <span>Total</span>
                    <span>:</span>
                    <span id="grand-total">Rp 0</span>
                </div>
                <button class="btn-neu-checkout">Selesaikan Pembayaran</button>
            </div>

        </div>
    </main>

    <footer class="footer-section">
        <div class="footer-container">
            <div class="footer-column">
                <h3>CUSTOMER SERVICE</h3>
                <ul>
                    <li><a href="#">Help Centre</a></li>
                    <li><a href="#">How To Buy</a></li>
                    <li><a href="#">Payment Methods</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h3>ABOUT ELVRA</h3>
                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Policies</a></li>
                    <li><a href="#">Privacy Policy</a></li>
                </ul>
            </div>
            <div class="footer-column payment-col">
                <div class="payment-grid">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Visa_Inc._logo_%282021%E2%80%93present%29.svg/3840px-Visa_Inc._logo_%282021%E2%80%93present%29.svg.png" alt="Visa">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" alt="BCA">
                </div>
            </div>
            <div class="footer-column">
                <h3>FOLLOW US</h3>
                <ul class="social-links">
                    <li><a href="#"><i class="fa-brands fa-instagram"></i> Instagram</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
