<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Elvra.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="homePage.css">
    <link rel="stylesheet" href="payments.css">
</head>
<body class="checkout-bg">

    <header>
        <div class="logo">
            <a href="homePage.html" style="display: flex; align-items: center; color: inherit;">
                <img src="images/logoimg.png" alt="Logo">
                <h2>Elvra.</h2>
            </a>
        </div>
        <nav class="navbar">
            <a href="homePage.html">Home</a>
            <a href="homePage.html#about-us">About</a>
            <a href="ProductsPage.html">Products</a>
            <a href="#">Review</a>
            <a href="Contact.html">Contact</a>
        </nav>
        <div class="header-icons">
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="#"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-grid">
            
            <div class="checkout-left-column">
                
                <div class="neu-card-box">
                    <h3 class="section-title"><i class="fa-solid fa-location-dot"></i> Detail Pengiriman</h3>
                    <div class="address-form-neu">
                        <input type="text" id="input-nama" class="neu-input" placeholder="Nama Lengkap Penerima">
                        <input type="number" id="input-telepon" class="neu-input" placeholder="Nomor Telepon / WA">
                        <textarea id="input-alamat" class="neu-input" rows="3" placeholder="Alamat Lengkap (Nama Jalan, RT/RW, Kecamatan, Kota, Kode Pos)"></textarea>
                    </div>
                </div>

                <div class="neu-card-box">
                    <h3 class="section-title"><i class="fa-solid fa-box-open"></i> Produk yang Dipesan</h3>
                    <div id="checkout-products-list">
                        </div>
                </div>

                <div class="neu-card-box">
                    <h3 class="section-title"><i class="fa-solid fa-truck-fast"></i> Opsi Pengiriman</h3>
                    <select id="shipping-select" class="neu-select">
                        <option value="15000" selected>Reguler (Rp 15.000) - Estimasi 2-3 Hari</option>
                        <option value="25000">Kargo/Ekspedisi (Rp 25.000) - Estimasi 3-5 Hari</option>
                        <option value="40000">Instant / Same Day (Rp 40.000) - Tiba Hari Ini</option>
                    </select>
                </div>

            </div>

            <div class="checkout-right-column">
                
                <div class="neu-card-box">
                    <h3 class="section-title"><i class="fa-solid fa-credit-card"></i> Metode Pembayaran</h3>
                    <div class="payment-options">
                        <label class="payment-label">
                            <input type="radio" name="payment-method" value="QRIS" checked>
                            <span><i class="fa-solid fa-qrcode"></i> QRIS (Gopay/OVO/Dana)</span>
                        </label>
                        <label class="payment-label">
                            <input type="radio" name="payment-method" value="Transfer Bank BCA">
                            <span><i class="fa-solid fa-building-columns"></i> Transfer Bank BCA</span>
                        </label>
                        <label class="payment-label">
                            <input type="radio" name="payment-method" value="COD (Bayar di Tempat)">
                            <span><i class="fa-solid fa-hand-holding-dollar"></i> Bayar di Tempat (COD)</span>
                        </label>
                    </div>
                </div>

                <div class="neu-card-box text-right">
                    <h3 class="section-title text-left"><i class="fa-solid fa-receipt"></i> Ringkasan Total</h3>
                    <div class="billing-row">
                        <span>Subtotal Produk:</span>
                        <span id="summary-subtotal">Rp 0</span>
                    </div>
                    <div class="billing-row">
                        <span>Biaya Ongkir:</span>
                        <span id="summary-shipping">Rp 15.000</span>
                    </div>
                    <hr class="neu-divider">
                    <div class="billing-row total-row">
                        <span>Total Pembayaran:</span>
                        <strong id="summary-grand-total">Rp 0</strong>
                    </div>
                    <button class="btn-place-order" id="btn-buat-pesanan">Buat Pesanan Sekarang</button>
                </div>

            </div>

        </div>
    </main>

    <script src="payments.js"></script>
</body>
</html>
