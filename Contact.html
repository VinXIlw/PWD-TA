<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Elvra - Home </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Contact.css">
</head>
<body>
    <body class="home-mockup">

    <header>
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; color: inherit;">
                <img src="images/logoimg.png" alt="Logo" onerror="this.src='https://via.placeholder.com/35'">
                <h2>Elvra.</h2>
            </a>
        </div>
        <nav class="navbar">
            <a href="homePage.html">Home</a>
            <a href="homePage.html#about-us">About</a>
            <a href="ProductsPage.html">Products</a>
            <a href="#">Review</a>
            <a href="#">Contact</a>
        </nav>
        <div class="header-icons">
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="#"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

<div class="contact-container">
    <h1 class="main-title">Contact Us</h1>
    
    <div class="contact-card">
      <div class="contact-upper">
        
        <div class="map-box">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.8179515904924!2d109.3218!3d-0.0263!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMMKwMDEnMzQuNyJTIDEwOcKwMTknMTguNSJF!5e0!3m2!1sid!2sid!4v1650000000000!5m2!1sid!2sid" 
            allowfullscreen="" 
            loading="lazy">
          </iframe>
        </div>

        <div class="form-box">
          <form id="contactForm">
  <div class="input-group">
    <input type="text" id="nama" placeholder="Name" required>
  </div>
  <div class="input-group">
    <input type="email" id="email" placeholder="Email address" required>
  </div>
  <div class="input-group">
    <textarea id="pesan" placeholder="Message" rows="5" required></textarea>
  </div>
  <button type="submit" class="btn-send">Send now</button>
</form>
        </div>

      </div>

      <div class="contact-lower">
        
        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-phone-volume"></i>
          </div>
          <div class="info-text">
            <h3>Call</h3>
            <p>0898-1234-2812</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-regular fa-envelope-open"></i>
          </div>
          <div class="info-text">
            <h3>Email</h3>
            <p>ashiappp123@gmail.com</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="info-text">
            <h3>Location</h3>
            <p>Pontianak, Indonesia</p>
          </div>
        </div>

      </div>
    </div>
  </div>
  
  <script src="Contact.js"></script>
</body>
</html>
