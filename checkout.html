<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Elvra.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS INTERNAL AGAR PASTI JALAN */
        :root { --primary: #48bb78; --black: #1a1a1a; --bg-body: #f8f9fa; --border-color: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; text-decoration: none !important; }
        body { background-color: var(--bg-body); color: var(--black); min-height: 100vh; padding-top: 80px; }
        header { background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 35px; }
        .checkout-container { padding: 40px 5%; display: flex; justify-content: center; }
        .checkout-layout { display: flex; gap: 30px; width: 100%; max-width: 1100px; align-items: flex-start; }
        .checkout-box { background: #fff; padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); }
        .form-side { flex: 1.5; }
        .summary-side { flex: 1; position: sticky; top: 100px; }
        .checkout-title { font-size: 18px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .order-item { display: flex; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .order-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .total-line { font-size: 18px; font-weight: 700; color: var(--primary); border-top: 1px solid #eee; pt: 10px; }
        .btn-pay { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/logoimg.png" alt="Logo">
            <h2>Elvra.</h2>
        </div>
        <div class="header-icons">
            <a href="index.html" style="color: #333;"><i class="fa-solid fa-house"></i></a>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-layout">
            <div class="checkout-box form-side">
                <h2 class="checkout-title">Informasi Pengiriman</h2>
                <div class="form-group"><label>Nama Lengkap</label><input type="text" placeholder="Nama anda..."></div>
                <div class="form-group"><label>Alamat</label><input type="text" placeholder="Alamat lengkap..."></div>
                <h2 class="checkout-title" style="margin-top:20px;">Pembayaran</h2>
                <div style="padding: 10px; border: 1px solid #eee; border-radius: 4px;">
                    <input type="radio" checked> QRIS / E-Wallet
                </div>
            </div>

            <div class="checkout-box summary-side">
                <h2 class="checkout-title">Ringkasan</h2>
                <div id="display-produk">
                    <p style="color: #999; font-size: 13px;">Memuat produk...</p>
                </div>
                <div style="margin-top: 20px;">
                    <div class="summary-line"><span>Subtotal</span><span id="txt-sub">Rp0</span></div>
                    <div class="summary-line"><span>Ongkir</span><span>Rp15.000</span></div>
                    <div class="summary-line total-line"><span>Total</span><span id="txt-total">Rp0</span></div>
                </div>
                <button class="btn-pay" id="btn-konfirmasi">Bayar Sekarang</button>
            </div>
        </div>
    </main>

    <script>
        // KODE JAVASCRIPT MANDIRI - TIDAK BUTUH SCRIPT.JS UNTUK HALAMAN INI
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('display-produk');
            const subEl = document.getElementById('txt-sub');
            const totEl = document.getElementById('txt-total');

            // 1. Ambil data (Cek Keranjang atau Beli Langsung)
            let items = JSON.parse(localStorage.getItem('cartItems')) || [];
            let direct = JSON.parse(localStorage.getItem('pendingOrder'));
            
            if (items.length === 0 && direct) {
                items.push(direct);
            }

            // 2. Jika Benar-benar Kosong
            if (items.length === 0) {
                container.innerHTML = '<p style="color:red; font-size:13px;">Belum ada produk dipilih.</p>';
                return;
            }

            // 3. Render & Hitung
            container.innerHTML = '';
            let subtotal = 0;

            items.forEach(item => {
                let p = Number(item.price) || 150000;
                let q = Number(item.qty) || 1;
                subtotal += (p * q);

                container.innerHTML += `
                    <div class="order-item">
                        <img src="${item.image}">
                        <div>
                            <h4 style="font-size:13px;">${item.name}</h4>
                            <p style="font-size:11px; color:#666;">${item.color} | Size ${item.size}</p>
                            <p style="font-size:13px; font-weight:700;">${q} x Rp${p.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                `;
            });

            // 4. Update Tampilan Harga
            subEl.innerText = 'Rp' + subtotal.toLocaleString('id-ID');
            totEl.innerText = 'Rp' + (subtotal + 15000).toLocaleString('id-ID');

            // 5. Tombol Bayar
            document.getElementById('btn-konfirmasi').addEventListener('click', function() {
                alert('Pesanan Dibuat!');
                localStorage.clear();
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
